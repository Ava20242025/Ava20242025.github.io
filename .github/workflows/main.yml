name: Math Solver Workflow
on: [push, workflow_dispatch]

jobs:
  solve-math:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gives the robot the 'pen' to write in your folder
      
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install matplotlib

      - name: Run Math Script
        run: python math_solver.py

      - name: Commit and Push Diagram
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add diagram.png
          # This next line prevents error if the photo hasn't changed
          git commit -m "Updated math diagram" || echo "No changes to commit"
          git push
