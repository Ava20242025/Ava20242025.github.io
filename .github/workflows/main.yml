
name: Math Solver Workflow
on: [push, workflow_dispatch]

jobs:
  solve-math:
    runs-on: ubuntu-latest
    # This gives the robot permission to write files back to your folder
    permissions:
      contents: write
      
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install matplotlib

      - name: Run Math Script
        run: python math_solver.py

      - name: Save photo to folder
        run: |
          git config --global user.name "MathBot"
          git config --global user.email "bot@github.com"
          git add diagram.png
          git commit -m "Robot added the math diagram"
          git push
